version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.3
    container_name: infra_postgis
    environment:
      POSTGRES_USER: infra_user
      POSTGRES_PASSWORD: infra_password
      POSTGRES_DB: infra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    build: ./backend
    container_name: infra_api
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://infra_user:infra_password@db/infra_db

volumes:
  postgres_data:
